name: "Docker Build and Push"
description: "Builds a Docker image and pushes it to the specified registry."
inputs:
  registry:
    description: "Container registry to push to."
    required: false
    default: "docker.io"
  image-name:
    description: "Name of the image to build and push."
    required: true
  dockerfile:
    description: "Dockerfile path."
    required: false
    default: "Dockerfile"
  context:
    description: "Build context path."
    required: false
    default: "."
  username:
    description: "Registry username."
    required: false
  password:
    description: "Registry password or token."
    required: false
  push:
    description: "Whether to push the image to the registry."
    required: false
    default: "true"
  build-tar:
    description: "Whether to build a tar file of the Docker image."
    required: false
    default: "false"
  tar-name:
    description: "Name of the output tar file."
    required: false
    default: "image.tar"
  upload-artifact:
    description: "Whether to upload the tar file as a GitHub Actions artifact."
    required: false
    default: "false"
runs:
  using: "composite"
  steps:
    - name: Check out repository
      uses: actions/checkout@v6

    - name: Log in to registry
      if: ${{ inputs.username != '' && inputs.password != '' }}
      uses: docker/login-action@v4
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.username }}
        password: ${{ inputs.password }}

    - name: Build Docker image
      shell: bash
      run: docker build -f "${{ inputs.dockerfile }}" -t "${{ inputs.registry }}/${{ inputs.image-name }}" "${{ inputs.context }}"

    - name: Push Docker image
      if: ${{ inputs.push == 'true' && inputs.username != '' && inputs.password != '' }}
      shell: bash
      run: docker push "${{ inputs.registry }}/${{ inputs.image-name }}"

    - name: Build Docker tarball
      if: ${{ inputs.build-tar == 'true' }}
      shell: bash
      run: docker save -o "${{ inputs.tar-name }}" "${{ inputs.registry }}/${{ inputs.image-name }}"

    - name: Upload Docker tarball artifact
      if: ${{ inputs.upload-artifact == 'true' && inputs.build-tar == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.tar-name }}
        path: ${{ inputs.tar-name }}
