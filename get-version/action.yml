name: 'Get Version'
description: 'Fetches project version from pyproject.toml, package.json, or go.mod'
inputs:
  path:
    description: 'Path to the directory containing the version file'
    required: false
    default: '.'
outputs:
  version:
    description: 'The extracted version'
    value: ${{ steps.get_version.outputs.version }}
runs:
  using: 'composite'
  steps:
    - id: get_version
      shell: bash
      run: |
        WORKDIR="${{ inputs.path }}"
        VERSION=""

        if [ -f "$WORKDIR/pyproject.toml" ]; then
          echo "Found pyproject.toml"
          # Try [project] version first, then [tool.poetry] version
          VERSION=$(grep -E "^version[[:space:]]*=[[:space:]]*" "$WORKDIR/pyproject.toml" | cut -d '"' -f 2 | cut -d "'" -f 2 | head -n 1 || true)
          if [ -z "$VERSION" ]; then
             VERSION=$(grep -E "^version[[:space:]]*=[[:space:]]*" "$WORKDIR/pyproject.toml" | head -n 1 | sed -E 's/version[[:space:]]*=[[:space:]]*["'\'']([^"'\'']+)["'\'']/\1/' || true)
          fi
        elif [ -f "$WORKDIR/package.json" ]; then
          echo "Found package.json"
          VERSION=$(jq -r .version "$WORKDIR/package.json" || true)
        elif [ -f "$WORKDIR/go.mod" ]; then
          echo "Found go.mod"
          # go.mod doesn't have a standard version field. 
          # Some people use a comment or the 'go' directive for toolchain version.
          # We'll try to find a commented version or fall back to the go version if requested?
          # For now, let's look for a line like '// version: x.y.z' or just the go version.
          VERSION=$(grep -E "^//[[:space:]]*version:[[:space:]]*" "$WORKDIR/go.mod" | cut -d ':' -f 2 | xargs || true)
          if [ -z "$VERSION" ]; then
            # Fallback: Extract go version as a placeholder or secondary option
            VERSION=$(grep -E "^go[[:space:]]+" "$WORKDIR/go.mod" | cut -d ' ' -f 2 || true)
          fi
        fi

        if [ -z "$VERSION" ]; then
          echo "::error::Could not find version in pyproject.toml, package.json, or go.mod"
          exit 1
        fi

        echo "Extracted version: $VERSION"
        echo "version=$VERSION" >> $GITHUB_OUTPUT
